services:
  game_api:
    build: game_api
    ports:
      - 9999:9999
    depends_on:
      - database

  database:
    image: postgres:17
    environment:
      POSTGRES_DB: db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - 5432:5432

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - 5050:80
    depends_on:
      - database

  model_joris:
    build: model_joris

volumes:
  pgadmin_data:
  postgres_data: